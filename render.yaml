services:
  - type: worker
    name: conclave-aegis-bot
    runtime: node
    buildCommand: npm install
    startCommand: node bot.js
    plan: starter
    envVars:
      # ── Static config ──────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: BOT_PORT
        value: 3001
      - key: DISCORD_GUILD_ID
        value: "1438103556610723922"
      - key: API_URL
        value: https://api.theconclavedominion.com
      - key: BEACON_CLIENT_ID
        value: eb9ecdff-4048-4a83-8f40-f2e16d2e9a81
      # ── Fill in Render Dashboard (sync: false = secret) ──
      - key: LAUNCHPAD_EDIT_INTERVAL
        value: "12000"

      # ── Secrets (fill in Render Dashboard → Environment) ───────────
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: ROLE_OWNER_ID
        sync: false
      - key: ROLE_ADMIN_ID
        sync: false
      - key: ROLE_HELPER_ID
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AEGIS_CHANNEL_ID
        sync: false
      - key: BEACON_CLIENT_SECRET
        sync: false
      - key: BEACON_ACCESS_TOKEN
        sync: false
      - key: BEACON_REFRESH_TOKEN
        sync: false
      - key: BEACON_TOKEN_EXPIRES
        sync: false
      - key: BEACON_GROUP_ID
        sync: false
      - key: NITRADO_API_KEY
        sync: false
      - key: MONITOR_STATUS_CHANNEL_ID
        sync: false
      - key: MONITOR_ACTIVITY_CHANNEL_ID
        sync: false
      - key: MONITOR_MESSAGE_ID

      # ── Shop ──────────────────────────────────────────────────────
      - key: ORDERS_CHANNEL_ID
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: SHOP_WEBHOOK_URL
        sync: false

      # ── Beacon ────────────────────────────────────────────────────
      - key: BEACON_CLIENT_SECRET
        sync: false
      - key: BEACON_ACCESS_TOKEN
        sync: false
      - key: BEACON_REFRESH_TOKEN
        sync: false
      - key: BEACON_TOKEN_EXPIRES
        sync: false
      - key: BEACON_GROUP_ID
        sync: false

      # ── Nitrado ───────────────────────────────────────────────────
      - key: NITRADO_API_KEY
        sync: false

      # ── Monitor (fill after /setup-monitoring) ────────────────────
      - key: MONITOR_STATUS_CHANNEL_ID
        sync: false
      - key: MONITOR_ACTIVITY_CHANNEL_ID
        sync: false
      - key: MONITOR_MESSAGE_ID
        sync: false
